name: Cover-Bilder herunterladen

on:
  workflow_dispatch:

jobs:
  download-covers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ordner erstellen und alte Cover verschieben
        run: |
          mkdir -p covers/haupt covers/spezial covers/enten covers/premium
          mkdir -p covers/ultimat covers/maus covers/crime covers/abenteuer
          mkdir -p covers/history covers/fantasy covers/galaxy covers/europa covers/mystery
          if ls covers/LTB_*.jpg 2>/dev/null | head -1 | grep -q .; then
            mv covers/LTB_*.jpg covers/haupt/
            echo "Verschoben: $(ls covers/haupt/ | wc -l) Cover nach covers/haupt/"
          else
            echo "Keine alten Cover zu verschieben"
          fi

      - name: Cover herunterladen
        run: |
          python3 << 'PYEOF'
          import hashlib, urllib.request, os, time

          # Hauptreihe: LTB_N.jpg (mit Underscore, jpg)
          # Nebenreihen: "LTB Reihe N.png" (mit Leerzeichen, png)
          SERIES = [
            ('haupt',     610, 'LTB_{n}.jpg',                    'jpg'),
            ('spezial',   112, 'LTB Spezial {n}.png',            'png'),
            ('enten',      96, 'LTB Enten-Edition {n}.png',      'png'),
            ('premium',    50, 'LTB Premium {n}.png',            'png'),
            ('ultimat',    48, 'LTB Ultimate Phantomias {n}.png','png'),
            ('maus',       30, 'LTB Maus-Edition {n}.png',       'png'),
            ('crime',      30, 'LTB Crime {n}.png',              'png'),
            ('abenteuer',  20, 'LTB Abenteuer {n}.png',          'png'),
            ('history',     6, 'LTB History {n}.png',            'png'),
            ('fantasy',     6, 'LTB Fantasy {n}.png',            'png'),
            ('galaxy',      6, 'LTB Galaxy {n}.png',             'png'),
            ('europa',      6, 'LTB Europareise {n}.png',        'png'),
            ('mystery',     6, 'LTB Mystery {n}.png',            'png'),
          ]

          headers = {
            'Referer': 'https://de.duckipedia.org/',
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
          }
          total_ok, total_skip = 0, 0

          for key, count, pattern, ext in SERIES:
            print('\n=== ' + key + ' (' + str(count) + ') ===')
            ok, skip = 0, 0
            for n in range(1, count+1):
              path = 'covers/' + key + '/LTB_' + str(n) + '.' + ext
              if os.path.exists(path):
                continue
              fname = pattern.replace('{n}', str(n))
              h = hashlib.md5(fname.encode()).hexdigest()
              url = 'https://de.duckipedia.org/images/' + h[0] + '/' + h[:2] + '/' + fname.replace(' ', '_')
              try:
                req = urllib.request.Request(url, headers=headers)
                with urllib.request.urlopen(req, timeout=15) as r:
                  data = r.read()
                if len(data) > 1000:
                  open(path, 'wb').write(data)
                  ok += 1
                else:
                  skip += 1
              except Exception as e:
                skip += 1
              time.sleep(0.08)
            print('  ' + key + ': ' + str(ok) + ' OK, ' + str(skip) + ' skip')
            total_ok += ok
            total_skip += skip

          print('\nGesamt: ' + str(total_ok) + ' OK, ' + str(total_skip) + ' skip')
          PYEOF

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet && echo "Keine Aenderungen" || (
            COUNT=$(find covers -name "*.jpg" -o -name "*.png" | wc -l)
            git commit -m "Cover aktualisiert ($COUNT Dateien)"
            git push
          )
