name: Cover-Bilder herunterladen

on:
  workflow_dispatch:

jobs:
  download-covers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ordner erstellen und alte Cover verschieben
        run: |
          mkdir -p covers/haupt covers/spezial covers/enten covers/premium
          mkdir -p covers/ultimat covers/maus covers/crime covers/abenteuer
          mkdir -p covers/history covers/fantasy covers/galaxy covers/europa covers/mystery
          if ls covers/LTB_*.jpg 2>/dev/null | head -1 | grep -q .; then
            mv covers/LTB_*.jpg covers/haupt/
            echo "Verschoben: $(ls covers/haupt/ | wc -l) Cover"
          fi

      - name: Cover via Galerie-Seiten herunterladen
        run: |
          python3 << 'PYEOF'
          import urllib.request, re, os, time

          BASE = 'https://de.duckipedia.org'
          HEADERS = {
            'Referer': 'https://de.duckipedia.org/',
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36',
            'Accept': 'text/html,application/xhtml+xml',
            'Accept-Language': 'de-DE,de;q=0.9',
          }

          # (key, count, duckipedia_article, link_pattern)
          SERIES = [
            ('haupt',     610, 'Covergalerie_Lustiges_Taschenbuch',       r'/LTB_(\d+)"'),
            ('spezial',   118, 'Lustiges_Taschenbuch_Spezial',            r'/LTB_Spezial_(\d+)"'),
            ('enten',      96, 'Lustiges_Taschenbuch_Enten-Edition',      r'/LTB_Enten-Edition_(\d+)"'),
            ('premium',    50, 'Lustiges_Taschenbuch_Premium',            r'/LTB_Premium_(\d+)"'),
            ('ultimat',    48, 'Lustiges_Taschenbuch_Ultimate_Phantomias',r'/LTB_Ultimate_Phantomias_(\d+)"'),
            ('maus',       30, 'Lustiges_Taschenbuch_Maus-Edition',       r'/LTB_Maus-Edition_(\d+)"'),
            ('crime',      30, 'Lustiges_Taschenbuch_Crime',              r'/LTB_Crime_(\d+)"'),
            ('abenteuer',  20, 'Lustiges_Taschenbuch_Abenteuer',          r'/LTB_Abenteuer_(\d+)"'),
            ('history',     6, 'Lustiges_Taschenbuch_History',            r'/LTB_History_(\d+)"'),
            ('fantasy',     6, 'Lustiges_Taschenbuch_Fantasy',            r'/LTB_Fantasy_(\d+)"'),
            ('galaxy',      6, 'Lustiges_Taschenbuch_Galaxy',             r'/LTB_Galaxy_(\d+)"'),
            ('europa',      6, 'Lustiges_Taschenbuch_Europareise',        r'/LTB_Europareise_(\d+)"'),
            ('mystery',     6, 'Lustiges_Taschenbuch_Mystery',            r'/LTB_Mystery_(\d+)"'),
          ]

          def fetch_html(url):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=20) as r:
              return r.read().decode('utf-8', errors='replace')

          def thumb_to_full(thumb_url):
            url = re.sub(r'/thumb/', '/', thumb_url)
            url = re.sub(r'/\d+px-[^/]+$', '', url)
            if not url.startswith('http'):
              url = BASE + url
            return url

          def scrape_covers(article, link_pat, count):
            url = BASE + '/' + article
            print('  Fetching: ' + url)
            try:
              html = fetch_html(url)
            except Exception as e:
              print('  FEHLER: ' + str(e))
              return {}

            covers = {}
            # Find pairs: link to LTB page + nearby thumb image
            # Strategy: find all gallery list items
            items = re.findall(
              r'href="(/[^"]+)"[^>]*>.*?src="([^"]+/thumb/[^"]+)"',
              html, re.DOTALL
            )
            for link, thumb in items:
              if not re.search(link_pat, link + '"'):
                continue
              m = re.search(r'(\d+)$', link)
              if m:
                n = int(m.group(1))
                if 1 <= n <= count and n not in covers:
                  covers[n] = thumb_to_full(thumb)

            # Fallback: find by img alt text
            if len(covers) < count // 2:
              alts = re.findall(
                r'<img[^>]+alt="[^"]*?(\d+)[^"]*"[^>]+src="([^"]+/thumb/[^"]+)"',
                html
              )
              for num, thumb in alts:
                n = int(num)
                if 1 <= n <= count and n not in covers:
                  covers[n] = thumb_to_full(thumb)

            print('  Gefunden: ' + str(len(covers)) + '/' + str(count))
            return covers

          def download_cover(url, path):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=20) as r:
              data = r.read()
            if len(data) > 1000:
              open(path, 'wb').write(data)
              return True
            return False

          total_ok = total_skip = 0

          for key, count, article, link_pat in SERIES:
            print('\n=== ' + key + ' ===')
            covers = scrape_covers(article, link_pat, count)
            ok = skip = 0

            for n in range(1, count + 1):
              # Skip if already exists
              if any(os.path.exists('covers/' + key + '/LTB_' + str(n) + '.' + e)
                     for e in ['jpg','JPG','jpeg','png','PNG']):
                continue

              if n not in covers:
                skip += 1
                continue

              img_url = covers[n]
              ext = (re.search(r'\.(\w+)$', img_url) or re.search(r'', '')).group(1) if re.search(r'\.(\w+)$', img_url) else 'jpg'
              ext = ext.lower()
              if ext == 'jpeg': ext = 'jpg'
              path = 'covers/' + key + '/LTB_' + str(n) + '.' + ext

              try:
                if download_cover(img_url, path):
                  ok += 1
                  if ok % 50 == 0:
                    print('  ...' + str(ok) + ' OK')
                else:
                  skip += 1
              except Exception as e:
                skip += 1

              time.sleep(0.1)

            print('  ' + key + ': ' + str(ok) + ' OK, ' + str(skip) + ' skip')
            total_ok += ok
            total_skip += skip

          print('\nGesamt: ' + str(total_ok) + ' OK, ' + str(total_skip) + ' skip')
          PYEOF

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet && echo "Keine Aenderungen" || (
            COUNT=$(find covers -type f | wc -l)
            git commit -m "Cover aktualisiert ($COUNT Dateien)"
            git push
          )
